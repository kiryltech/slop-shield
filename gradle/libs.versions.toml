kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin-reflect" }
kotlin-logging = { module = "io.github.oshai:kotlin-logging-jvm", version.ref = "kotlin-logging" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
mapdb = { module = "org.mapdb:mapdb", version.ref = "mapdb" }
reflections = { module = "org.reflections:reflections", version.ref = "reflections" }
flexmark-html2md = { module = "com.vladsch.flexmark:flexmark-html2md-converter", version.ref = "flexmark" }

[plugins]
jvm = { id = "org.jetbrains.kotlin.jvm", version = "1.9.20" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version = "1.9.20" }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SlopShield Dashboard: The Curator's Lens</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3498db",
                        "background-light": "#f0f4f8",
                        "background-dark": "#1a2a33",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="flex h-screen w-full">
    <!-- Sidebar (Left) -->
    <aside class="w-64 border-r border-primary/20 flex flex-col bg-white dark:bg-background-dark shrink-0">
        <div class="p-6">
            <div class="flex items-center gap-2 mb-1">
                <div class="bg-primary p-1.5 rounded-lg text-background-dark">
                    <span class="material-symbols-outlined block text-xl">shield_with_heart</span>
                </div>
                <h1 class="text-lg font-bold tracking-tight">SlopShield</h1>
            </div>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">The Curator's Lens</p>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <div class="mb-4">
                <p class="px-3 mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-400">Navigation</p>
                <a class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-slate-900 dark:text-primary font-medium" href="#" id="nav-inbox">
                    <span class="material-symbols-outlined text-xl">inbox</span>
                    <span class="text-sm">Inbox</span>
                    <span class="ml-auto bg-primary text-background-dark text-[10px] px-1.5 py-0.5 rounded-full font-bold" id="inbox-count">0</span>
                </a>
                <a class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors" href="#" id="nav-high-signal">
                    <span class="material-symbols-outlined text-xl">signal_cellular_alt</span>
                    <span class="text-sm">High Signal (&gt;7.5)</span>
                </a>
                <a class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors" href="#" id="nav-opposite">
                    <span class="material-symbols-outlined text-xl">compare_arrows</span>
                    <span class="text-sm">Opposite Views</span>
                </a>
                <a class="nav-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-primary/5 transition-colors" href="#" id="nav-noise">
                    <span class="material-symbols-outlined text-xl">delete</span>
                    <span class="text-sm">Noise Bin</span>
                </a>
            </div>
            <div class="mb-4">
                <p class="px-3 mb-2 text-[10px] font-bold uppercase tracking-wider text-slate-400">Context Monitor</p>
                <div class="px-3 py-2 space-y-2">
                    <div class="flex items-center gap-2 text-xs text-slate-500 bg-primary/5 p-2 rounded border border-primary/10">
                        <span class="material-symbols-outlined text-sm">description</span>
                        <span class="truncate">CONTEXT.md</span>
                        <div class="size-1.5 rounded-full bg-green-500 animate-pulse ml-auto"></div>
                    </div>
                    <div class="flex items-center gap-2 text-xs text-slate-500 bg-primary/5 p-2 rounded border border-primary/10">
                        <span class="material-symbols-outlined text-sm">html</span>
                        <span class="truncate">blog.xml</span>
                        <div class="size-1.5 rounded-full bg-green-500 animate-pulse ml-auto"></div>
                    </div>
                </div>
            </div>
        </nav>
        <div class="p-4 border-t border-primary/10">
            <div class="flex items-center justify-between px-2 mb-2">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Activity Log</p>
                <div class="flex items-center gap-1.5 bg-primary/10 px-2 py-0.5 rounded-full border border-primary/10" id="active-workers-pill">
                    <div class="size-1.5 rounded-full bg-primary animate-pulse"></div>
                    <span class="text-[9px] font-bold text-primary" id="active-workers-count">0 WORKERS</span>
                </div>
            </div>
            <div class="space-y-3 px-2 overflow-y-auto max-h-[150px]" id="activity-log">
                <!-- Activity events will be injected here -->
            </div>
        </div>
    </aside>
    <!-- Center Feed (Middle) -->
    <main class="flex-1 flex flex-col min-w-0 bg-background-light dark:bg-background-dark/50">
        <header class="h-16 border-b border-primary/10 flex items-center justify-between px-6 bg-white/50 dark:bg-background-dark/50 backdrop-blur-sm sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <div class="flex gap-2">
                    <button class="sort-btn active bg-primary/20 text-background-dark text-xs px-3 py-1 rounded-full font-medium hover:bg-primary transition-colors" id="sort-latest">Latest</button>
                    <button class="sort-btn text-slate-500 text-xs px-3 py-1 rounded-full font-medium hover:bg-primary/10 transition-colors" id="sort-score">Signal Score</button>
                </div>
            </div>
            <div class="flex items-center gap-4 ml-4 shrink-0">
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
                    <input class="pl-10 pr-4 py-1.5 bg-white dark:bg-slate-800 border-primary/10 rounded-lg text-sm w-64 focus:ring-primary focus:border-primary" placeholder="Search signals..." type="text" id="search-input"/>
                </div>
                <button class="size-8 rounded-full bg-primary flex items-center justify-center text-background-dark">
                    <span class="material-symbols-outlined">tune</span>
                </button>
            </div>
        </header>
        <div class="flex-1 overflow-y-auto p-6 space-y-4" id="story-feed">
            <!-- Live Feed Injected Here -->
        </div>
    </main>
    <!-- Right Pane (Deep Dive) -->
    <aside class="w-[450px] border-l border-primary/20 bg-white dark:bg-background-dark overflow-y-auto flex flex-col shrink-0" id="detail-pane">
        <div class="p-12 text-center text-slate-400 mt-20">
            <span class="material-symbols-outlined text-6xl mb-4">analytics</span>
            <p>Select a story to dive deep</p>
        </div>
    </aside>
</div>

<script src="script.js"></script>
</body>
</html>
